<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Professional Poster Generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    min-height:100vh;
    padding:30px;
    color:white;
}

.main-container{
    width:100%;
    max-width:1600px;
    margin:auto;
    display:grid;
    grid-template-columns:380px 1fr;
    gap:30px;
}

.control-panel{
    background:#111827;
    padding:30px;
    border-radius:25px;
    height:fit-content;
    position:sticky;
    top:20px;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 0 40px rgba(0,0,0,0.4);
}

.title{
    font-size:32px;
    font-weight:800;
    margin-bottom:10px;
    background:linear-gradient(90deg,#ff00cc,#3333ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.sub{
    color:#9ca3af;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:10px;
    font-weight:600;
    font-size:14px;
}

input,
textarea{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#1f2937;
    color:white;
    font-size:15px;
    border:2px solid transparent;
}

input:focus,
textarea:focus{
    border-color:#9333ea;
}

textarea{
    resize:none;
    height:90px;
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:18px;
    cursor:pointer;
    font-size:17px;
    font-weight:700;
    transition:0.3s;
    margin-top:10px;
}

.generate-btn{
    background:linear-gradient(135deg,#9333ea,#ec4899);
    color:white;
}

.download-btn{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
}

.btn:hover{
    transform:translateY(-3px);
}

.poster-wrapper{
    display:flex;
    justify-content:center;
}

.poster{
    width:850px;
    height:1200px;

    --bg1:#f3c4ff;
    --bg2:#ff99cc;

    background:linear-gradient(135deg,var(--bg1),var(--bg2));

    border-radius:30px;
    position:relative;
    overflow:hidden;
    box-shadow:0 0 50px rgba(0,0,0,0.4);
}

.shape1{
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,255,255,0.15);
    border-radius:50%;
    top:-180px;
    right:-100px;
}

.shape2{
    position:absolute;
    width:650px;
    height:650px;
    background:#d946ef;
    opacity:0.25;
    bottom:-250px;
    left:-200px;
    clip-path:polygon(0 100%,100% 0,100% 100%);
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:35px;
    position:relative;
    z-index:2;
}

.business-title{
    font-size:58px;
    font-weight:800;
    color:#111827;
}

.logo{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:20px;
    background:white;
    padding:6px;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.income-section{
    padding:0 35px;
    position:relative;
    z-index:2;
}

.today-income{
    font-size:42px;
    font-weight:700;
    color:#111827;
}

.amount{
    font-size:90px;
    font-weight:800;
    line-height:1;
    color:#000;
}

.content-area{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:40px 35px;
    position:relative;
    z-index:2;
}

.statement-box{
    width:230px;
    min-width:230px;
    max-width:230px;
    aspect-ratio:9/16;
    background:white;
    border-radius:20px;
    padding:10px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.statement-img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:14px;
    display:block;
}

.date{
    font-size:32px;
    font-weight:700;
    text-align:center;
    color:#111827;
    margin-top:15px;
}

.profile-section{
    display:flex;
    flex-direction:column;
    align-items:center;
    width:100%;
}

.profile-ring{
    width:320px;
    height:320px;

    min-width:320px;
    min-height:320px;

    max-width:320px;
    max-height:320px;

    aspect-ratio:1/1;

    border-radius:50%;
    overflow:hidden;

    padding:8px;

    background:linear-gradient(135deg,#ffffff,#9333ea,#ec4899);

    box-shadow:0 0 40px rgba(0,0,0,0.25);
}

.profile-img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    border-radius:50%;
    background:#ddd;
}

.name{
    margin-top:28px;
    font-size:42px;
    font-weight:800;
    color:#111827;
    text-align:center;

    width:100%;
    max-width:500px;

    line-height:1.4;
    word-wrap:break-word;

    padding:0 10px;
}

.address{
    position:absolute;
    bottom:60px;
    left:0;

    width:100%;

    text-align:center;

    font-size:32px;
    font-weight:700;

    color:#111827;

    padding:0 40px;

    line-height:1.5;

    word-wrap:break-word;

    z-index:2;
}

.decor-dot{
    position:absolute;
    width:15px;
    height:15px;
    border-radius:50%;
    background:#2563eb;
}

.d1{
    top:260px;
    right:360px;
}

.d2{
    top:300px;
    right:300px;
}

.d3{
    top:340px;
    right:340px;
}

.d4{
    top:290px;
    right:240px;
}

.footer{
    text-align:center;
    margin-top:25px;
    color:#9ca3af;
    font-size:15px;
    font-weight:500;
    letter-spacing:1px;
}

@media(max-width:1200px){

    .main-container{
        grid-template-columns:1fr;
    }

    .poster{
        width:100%;
        height:auto;
        aspect-ratio:210/297;
    }

}

@media(max-width:768px){

    body{
        padding:10px;
    }

    .business-title{
        font-size:34px;
    }

    .logo{
        width:80px;
        height:80px;
    }

    .today-income{
        font-size:28px;
    }

    .amount{
        font-size:58px;
    }

    .content-area{
        flex-direction:column;
        gap:30px;
    }

    .profile-ring{
        width:240px;
        height:240px;
        min-width:240px;
        min-height:240px;
    }

    .name{
        font-size:32px;
    }

    .address{
        font-size:22px;
        bottom:30px;
    }

}

</style>
</head>

<body>

<div class="main-container">

<div class="control-panel">

<div class="title">
Poster Generator
</div>

<div class="sub">
Generate professional income posters instantly.
</div>

<div class="input-group">
<label>Upload Profile Photo</label>
<input type="file" id="profileInput" accept="image/*">
</div>

<div class="input-group">
<label>Upload Income Screenshot</label>
<input type="file" id="statementInput" accept="image/*">
</div>

<div class="input-group">
<label>Enter Name</label>
<input type="text" id="nameInput" placeholder="Enter Full Name">
</div>

<div class="input-group">
<label>Enter Income</label>
<input type="text" id="incomeInput" placeholder="254">
</div>

<div class="input-group">
<label>Enter Address</label>
<textarea id="addressInput" placeholder="Pashchim Medinipur (WB)"></textarea>
</div>

<div class="input-group">
<label>Select Date</label>
<input type="date" id="dateInput">
</div>

<div class="input-group">
<label>Choose Background Color 1</label>
<input type="color" id="bgColor1" value="#f3c4ff">
</div>

<div class="input-group">
<label>Choose Background Color 2</label>
<input type="color" id="bgColor2" value="#ff99cc">
</div>

<button class="btn generate-btn" onclick="generatePoster()">
Generate Poster
</button>

<button class="btn download-btn" onclick="downloadPoster()">
Download Poster
</button>

</div>

<div class="poster-wrapper">

<div class="poster" id="poster">

<div class="shape1"></div>
<div class="shape2"></div>

<div class="decor-dot d1"></div>
<div class="decor-dot d2"></div>
<div class="decor-dot d3"></div>
<div class="decor-dot d4"></div>

<div class="top-bar">

<div class="business-title">
Digital Work
</div>

<img src="logo.png" class="logo">

</div>

<div class="income-section">

<div class="today-income">
My Today's Income
</div>

<div class="amount" id="posterIncome">
Rs- 254/-
</div>

</div>

<div class="content-area">

<div>

<div class="statement-box">
<img src="https://dummyimage.com/300x500/cccccc/000000.jpg&text=Income+Screenshot"
class="statement-img"
id="statementPreview">
</div>

<div class="date" id="posterDate"></div>

</div>

<div class="profile-section">

<div class="profile-ring">

<img src="https://dummyimage.com/500x500/cccccc/000000.jpg&text=Profile+Photo"
class="profile-img"
id="profilePreview">

</div>

<div class="name" id="posterName">
Your Name
</div>

</div>

</div>

<div class="address" id="posterAddress">
Pashchim Medinipur (WB)
</div>

</div>

</div>

</div>

<div class="footer">
Made with ❤️ by Shubham
</div>

<script>

const today = new Date();

document.getElementById('dateInput').value =
today.toISOString().split('T')[0];

document.getElementById('posterDate').innerText =
`${String(today.getDate()).padStart(2,'0')}/${String(today.getMonth()+1).padStart(2,'0')}/${today.getFullYear()}`;

function generatePoster(){

    const name =
    document.getElementById('nameInput').value;

    const income =
    document.getElementById('incomeInput').value;

    const address =
    document.getElementById('addressInput').value;

    const selectedDate =
    document.getElementById('dateInput').value;

    const bg1 =
    document.getElementById('bgColor1').value;

    const bg2 =
    document.getElementById('bgColor2').value;

    if(name.trim() !== ''){
        document.getElementById('posterName').innerText = name;
    }

    if(income.trim() !== ''){
        document.getElementById('posterIncome').innerText =
        `Rs- ${income}/-`;
    }

    if(address.trim() !== ''){
        document.getElementById('posterAddress').innerText = address;
    }

    if(selectedDate){

        const d = new Date(selectedDate);

        const formatted =
        `${String(d.getDate()).padStart(2,'0')}/${
        String(d.getMonth()+1).padStart(2,'0')}/${
        d.getFullYear()}`;

        document.getElementById('posterDate').innerText = formatted;
    }

    document.getElementById('poster')
    .style.setProperty('--bg1', bg1);

    document.getElementById('poster')
    .style.setProperty('--bg2', bg2);

    alert('Poster Generated Successfully!');

}

document.getElementById('profileInput')
.addEventListener('change', function(e){

    const file = e.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(event){

            document.getElementById('profilePreview').src =
            event.target.result;

        }

        reader.readAsDataURL(file);

    }

});

document.getElementById('statementInput')
.addEventListener('change', function(e){

    const file = e.target.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(event){

            document.getElementById('statementPreview').src =
            event.target.result;

        }

        reader.readAsDataURL(file);

    }

});

function downloadPoster(){

    const poster = document.getElementById('poster');

    html2canvas(poster,{
        scale:3
    }).then(canvas=>{

        const link = document.createElement('a');

        link.download = 'professional-poster.png';

        link.href = canvas.toDataURL('image/png');

        link.click();

    });

}

</script>

</body>
</html>
